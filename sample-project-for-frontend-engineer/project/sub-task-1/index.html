<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            background: #eef2ff;
            padding: 40px;
        }

        .app-container {
            background: #ffffff;
            padding: 24px;
            max-width: 1000px;
            margin: auto;
            display: flex;
            gap: 20px;
            box-shadow: 0px 0px 5px 0px #00000035;
        }



        main {
            flex: 3;
        }

        /* Sidebar */
        .sidebar {
            flex: 1;
            right: 0;
            top: 0;
            left: 0;
            bottom: 0;
            display: none;
            position: fixed;
            background-color: #1e010144;
            z-index: 1;
            height: 100%;
        }

        .sidebar-container {
            background-color: #FFF;
            height: 100vh;
            width: 480px;
            position: absolute;
            right: 0;
            padding: 20px;
            box-shadow: -2px 3px 4px 0px #00000040;
            display: flex;
            flex-direction: column;
            gap: 1rem
        }

        .sidebar[open] {
            display: block;
        }

        .sidebar-controls-container {
            text-align: end;
        }

        /* Header */
        .filter-header {
            margin-bottom: 20px;
        }

        .filter-header label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
        }

        .input-date-field {
            border: 1px solid #e5e7eb;
            /* border-radius: 4px; */
            padding: 8px 12px;
        }

        .btn-prime {
            background: #a855f7;
            color: white;
            border: none;
            padding: 8px 18px;
            /* border-radius: 4px;  */
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            background: #ec4899;
            color: white;
            border: none;
            padding: 8px 18px;
            /* border-radius: 4px;  */
            font-weight: 600;
            cursor: pointer;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            font-size: 12px;
            color: #9ca3af;
            padding: 12px 16px;
        }

        .data-table td {
            padding: 12px 16px;
            border-top: 1px solid #f3f4f6;
            font-size: 14px;
        }

        .data-table tr:hover {
            background: #fafafa;
        }

        .col-actions-left {
            width: 48px;
        }

        .col-meta-right {
            width: 160px;
            text-align: right;

            button {
                float: right
            }
        }

        /* Icons */
        .icon-edit {
            margin-left: 8px;
            color: #6366f1;
            cursor: pointer;
        }

        .icon-delete {
            margin-left: 12px;
            color: #ef4444;
            cursor: pointer;
        }

        input[type="checkbox"] {
            accent-color: #a855f7;
        }

        /* Completed */
        .completed {
            text-decoration: line-through;
            color: #9ca3af;
        }

        /* Sidebar */
        textarea {
            width: 100%;
            margin-top: 10px;
        }

        .sidebar button {
            margin-top: 10px;
            margin-right: 10px;
        }

        .th-button {
            width: auto;
            background: none;
            border: none;
            font: inherit;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0;
        }

        .th-button:hover {
            color: #374151;
        }

        tr button {
            background: none;
            border: none;
            width: 16px;
            height: 16px;
            text-align: right;
        }

        .arrow {
            font-size: 10px;
        }

        @media (max-width: 768px) {
            .filter-header {
                display: flex;
                flex-direction: column;
                .filter-row {
                    display: flex;
                    flex-direction: column;
                    .button-group {
                        display: flex;
                        flex-direction: row;
                        gap: 12px;
                        justify-content: right;
                    }
                }
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <main>
            <div class="filter-header">
                <!-- <div class="mobile-filter-header"> 
                    Filters
                </div> -->
                <label for="startdate">
                    Creation Date
                </label>
                <div class="filter-row">
                    <input id="startdate" class="input-date-field" type="date" />
                    <input id="enddate" class="input-date-field" type="date" />
                    <div class="button-group">
                        <button id="applyBtn" class="btn-prime">APPLY</button>
                        <button id="resetBtn" class="btn-secondary">RESET</button>
                    </div>
                </div>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="col-actions-left"></th>
                        <th>
                            <button id="sortTitle" class="th-button">
                                Name <span class="arrow">⬍</span>
                            </button>
                        </th>
                        <th class="col-meta-right">
                            <button id="sortDate" class="th-button">
                                Creation Date <span class="arrow">⬍</span>
                            </button>
                        </th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>
        <aside id="sidebar" class="sidebar">
            <div class="backdrop"></div>
            <div class="sidebar-container">
                <div class="sidebar-controls-container">
                    <button id="saveBtn" class="btn-prime">Save</button>
                    <button id="closeBtn" class="btn-secondary">Close</button>
                </div>
                <label for="editDesc">
                    Description
                    <textarea id="editDesc" rows="6"></textarea>
                </label>
            </div>
        </aside>
    </div>

    <script>
        (() => {
            let todos = [];
            let selectedId = null;
            let sortField = 'creation_time'; // default
            let sortDirection = 'desc';

            const el = {
                tbody: document.querySelector('tbody'),
                start: document.querySelector('#startdate'),
                end: document.querySelector('#enddate'),
                apply: document.querySelector('#applyBtn'),
                reset: document.querySelector('#resetBtn'),
                sidebar: document.querySelector('#sidebar'),
                textbox: document.querySelector('#editDesc'),
                save: document.querySelector('#saveBtn'),
                close: document.querySelector('#closeBtn'),
                sortTitle: document.querySelector('#sortTitle'),
                sortDate: document.querySelector('#sortDate'),
            };

            const getRandomDate = (start, end) => {
                const s = new Date(start).getTime();
                const e = new Date(end).getTime();
                const t = s + Math.random() * (e - s);
                const d = new Date(t);
                return {
                    iso: d.toISOString().split('T')[0],
                    time: d.getTime()
                };
            };

            const formatDate = (iso) => {
                const d = new Date(iso);
                return `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;
            };

            const fetchTodos = async () => {
                const res = await fetch('https://jsonplaceholder.typicode.com/todos?_limit=20');
                const data = await res.json();

                return data.map(t => {
                    const date = getRandomDate('01/01/2025', '07/01/2025');
                    return {
                        ...t,
                        description: '',
                        creation_date: date.iso,
                        creation_time: date.time
                    };
                });
            };

            const getVisibleTodos = () => {

                const start = el.start.value;
                const end = el.end.value;
                const exact = el.exact?.value;
                const title = el.title?.value?.toLowerCase() || '';

                let result = todos.filter(t => {
                    const time = t.creation_time;

                    if (exact && t.creation_date !== exact) return false;

                    if (!exact) {
                        if (start && time < new Date(start).getTime()) return false;
                        if (end && time > new Date(end).getTime()) return false;
                    }

                    if (title && !t.title.toLowerCase().includes(title)) return false;

                    return true;
                });

                // SORTING
                result.sort((a, b) => {
                    if (sortField === 'title') {
                        const A = a.title.toLowerCase();
                        const B = b.title.toLowerCase();

                        return sortDirection === 'asc'
                            ? A.localeCompare(B)
                            : B.localeCompare(A);
                    }

                    // creation date
                    return sortDirection === 'asc'
                        ? a.creation_time - b.creation_time
                        : b.creation_time - a.creation_time;
                });

                return result;
            };

            const render = () => {
                const list = getVisibleTodos();

                if (!list.length) {
                    el.tbody.innerHTML = `<tr><td colspan="3">No data</td></tr>`;
                    return;
                }

                el.tbody.innerHTML = list.map(t => `
                    <tr data-id="${t.id}">
                        <td class="col-actions-left">
                            <input type="checkbox" ${t.completed ? 'checked' : ''}/>
                                <button data-action="edit">
                                <span class="icon-edit">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                                    </svg>
                                </span>
                            </button>
                        </td>
                        <td class="${t.completed ? 'completed' : ''}">
                            ${t.title}
                        </td>
                        <td class="col-meta-right">
                            ${formatDate(t.creation_date)}
                            <button data-action="delete">
                                <span class="icon-delete">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <!-- Trash can lid -->
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <!-- Vertical lines on the bin -->
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                </span>
                            </button>
                        </td>
                    </tr>
                `).join('');
            };

            // Events
            el.tbody.addEventListener('click', (e) => {

                const button = e.srcElement.closest('button');

                const row = e.target.closest('tr');

                if (!button && !row) return;

                const id = Number(row.dataset.id);
                const todo = todos.find(t => t.id === id);

                if (button.dataset.action == 'delete') {
                    todos = todos.filter(t => t.id !== id);
                    render();
                }

                if (button.dataset.action == 'edit') {
                    selectedId = id;
                    el.textbox.value = todo.description;
                    el.sidebar.setAttribute('open', true);
                }
            });

            el.tbody.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const row = e.target.closest('tr');
                    const id = Number(row.dataset.id);
                    const todo = todos.find(t => t.id === id);

                    todo.completed = e.target.checked;
                    render();
                }
            });

            // Open Draw
            el.save.addEventListener('click', _ => {
                const todo = todos.find(t => t.id === selectedId);

                if (!todo) return;
                todo.description = el.textbox.value.trim();
                el.sidebar.removeAttribute('open');
                render();
            });

            //  Close Draw
            el.close.addEventListener('click', _ => {
                el.sidebar.removeAttribute('open');
            });

            // Apply Date Range 
            el.apply.addEventListener('click', render);
            
            // Reset Date Range
            el.reset.addEventListener('click', _ => {
                el.start.value = '';
                el.end.value = '';
                render();
            });

            // Sort By Title 
            el.sortTitle.addEventListener('click', _ => {
                if (sortField === 'title') {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortField = 'title';
                    sortDirection = 'asc';
                }
                render();
            });

            // Sort By Date 
            el.sortDate.addEventListener('click', _ => {
                if (sortField === 'creation_time') {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortField = 'creation_time';
                    sortDirection = 'desc';
                }
                render();
            });

            fetchTodos().then(data => {
                todos = data;
                render();
            });
        })();
    </script>
</body>
</html>
